sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed

permalink: 'blog/:title'

compress_html:
  clippings: all

defaults:
  -
    scope:
      type: 'posts'
    values:
      layout: post
      post-image: ''
      description: ''
      tags:
        - ''
  -
    scope:
      type: 'pages'
    values:
      layout: page

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
